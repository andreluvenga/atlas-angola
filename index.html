<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="utf-8"/>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>Atlas Censitário de Angola</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css"/>
<script src="https://js.arcgis.com/4.29/"></script>

<style>

html,body,#viewDiv{
height:100%;
width:100%;
margin:0;
padding:0;
font-family:Arial;
}

#leftPanel{
position:absolute;
top:0;
left:0;
width:260px;
background:rgb(249,167,3);
padding:15px;
z-index:99;
max-height:100%;
overflow-y:auto;
box-shadow:0 0 8px rgba(0,0,0,0.3);
}

#topRightPanel{
position:absolute;
top:0;
right:0;
width:250px;
background:rgb(249,167,3);
padding:10px;
z-index:99;
}

#bottomRightPanel{
position:absolute;
bottom:0;
right:0;
width:250px;
background:rgb(249,167,3);
padding:10px;
z-index:99;
}

select{
width:100%;
margin-bottom:10px;
}

button{
width:100%;
padding:6px;
margin-top:5px;
}

</style>

</head>

<body>

<div id="viewDiv"></div>

<!-- PAINEL ESQUERDO -->

<div id="leftPanel">

<h4>Indicadores Demográficos</h4>

<label>População</label>
<select id="populacao">
  <option value="">Selecionar</option>
  <option value="Total">População Total</option>
  <option value="Homens">População Masculina</option>
  <option value="Mulheres">População Feminina</option>
</select>

<label>Grupos Etários</label>
<select id="getarios">
  <option value="">Selecionar</option>
  <option value="Idade_Média"> Idade Média da População</option>
  <option value="Idade_Mediana">Idade Mediana da População</option>
  <option value="F0_14_anos">Total da População dos 0 aos 14 anos</option>
  <option value="F0__17_anos">Total da População dos 0 aos 17 anos</option>
  <option value="F0_19_anos">Total da População dos 0 aos 19 anos</option>
  <option value="F2_ou_mais_anos">Total da População dos 2 anos ou mais</option>
  <option value="População_com_12_ou_mais_anos"> Total da População com 12 ou mais anos</option>
  <option value="F15_24_anos"> Total da População dos 15 aos 24 anos</option>
  <option value="F15_ou_mais_anos">Total da População dos 15 ou mais anos</option>
  <option value="F15_64_anos"> Total da População dos 15 aos 64 anos</option>
  <option value="F20_29_anos">Total da População dos 20 aos 29 anos</option>
  <option value="F30_54_anos">Total da População dos 30 aos 54 anos</option>
  <option value="F55_64_anos">Total da População dos 55 aos 64 anos</option>
  <option value="F65_ou_mais_anos">Total da População dos 65 anos ou mais</option>
  <option value="F65_74_anos">Total da População dos 65 aos 74 anos</option>
  <option value="F75_ou_mais_anos">Total da População dos 75 anos ou mais</option>
</select>

<label>Estado Civil</label>
<select id="estadoCivil">
  <option value="">Selecionar</option>
  <option value="Casado_ou_em_União_de_facto">Casados</option>
  <option value="Solteiro">Solteiros</option>
  <option value="Viúvo">Viúvos</option>
  <option value="Divorciado">Divorciados</option>
  <option value="Separado">Separados</option>
  <option value="Estado_Civil_Não_declarado">Estado Civíl Não Declarado</option>
</select>

<label>Registo Civil</label>
<select id="rcivil">
  <option value="">Selecionar</option>
  <option value="População_com_registo_de_nascimento">População com Registo de Nascimento</option>
  <option value="População_com_bilhete_de_identidade">População com BI</option>
</select>

<label>Deficiência e Albinismo</label>
<select id="defalbinismo">
  <option value="">Selecionar</option>
  <option value="População_com_albinismo">Total de População com Albinismo</option>
  </select>

<label>Orfandade</label>
<select id="orfandade">
  <option value="">Selecionar</option>
  <option value="Crianças_com_0___17_anos_que_não_vivem_com_os_pais">Total de Crianças com 0 a 17 anos que não vivem com os Pais</option>
  <option value="Mãe_vive_noutro_agregado">Total de Crianças com 0 a 17 anos que a Mãe vive noutro Agregado</option>
  <option value="Pai_vive_noutro_agregado">Total de Crianças com 0 a 17 anos que o Pai vive noutro Agregado</option>
  <option value="Ambos_vivem_noutro_agregado">Total de Crianças com 0 a 17 anos que Ambos os Pais vivem noutro Agregado</option>
</select>

<label>Grupos Étnicos</label>
<select id="getnicos">
  <option value="">Selecionar</option>
  <option value="GE_Quicongo__Kikongu_ou_Congolês_conguês">Grupo Étnico Quicongo</option>
  <option value="GE_Quimbundu__Kimbundu_ou_Tymbundu_">Grupo Étnico Quimbundu</option>
  <option value="GE_Lunda_Quioco__Lunda_kioko_ou_Lunda_Tchokwe_Tshokwe_">Grupo Étinico Lunda-Quioco</option>
  <option value="GE_Umbundu__ou_Ovimbundu_">Grupo Étnico Umbundu</option>
  <option value="GE_Nhaneca_Humbe__Nyaneka_Lumkumbi_">Grupo Étnico Nhaneca Humbe</option>
  <option value="GE_Ambó__Vahambo_tanbé_designado_Xikwanyama_">Grupo Étnico Ambó Vahambo</option>
  <option value="GE_Helelo__Herero__Tchielelo__Tjiherero_">Grupo Étnico Helelo-Herero</option>
  <option value="GE_Cuangar">Grupo Étnico Cuangar</option>
  <option value="GE_Khoisan">Grupo Étnico Khoisan</option>
  <option value="GE_Vátua">Grupo Étnico Vátua</option>
  <option value="GE_Kwoi">Grupo Étnico Kwoi</option>
  <option value="GE_Xindonga__Oshindonga_">Grupo Étnico Xindonga</option>
  <option value="GE_Não_sabe">População que não sabe o seu Grupo Étnico</option>
  <option value="GE_Outra_Etnia">Outro Grupo Étnico</option>
</select>

<label>Lingua Materna</label>
<select id="lmaterna">
  <option value="">Selecionar</option>
  <option value="LM_Português">Total da População que tem o Português como Língua Materna</option>
  <option value="LM_Kimbundu">Total da População que tem o Quimbundu como Língua Materna</option>
  <option value="LM_Umbundu">Total da População que tem o Umbundu como Língua Materna</option>
  <option value="LM_Kikongo">Total da População que tem o Kikongo como Língua Materna</option>
</select>

<label>Religião</label>
<select id="religiao">
  <option value="">Selecionar</option>
  <option value="Católica">Total da População que professa a Religião Católica </option>
  <option value="Evangélica">Total da População que professa a Religião Evangélica</option>
  <option value="Metodista">Total da População que professa a Religião Metodista</option>
  <option value="Tocoísta">Total da População que professa a Religião Tocoista</option>
</select>

<label>Educação</label>
<select id="educacao">
  <option value="">Selecionar</option>
  <option value="F15_ou_mais_anos_que_sabe_ler_e_escrever">15 anos ou mais que Sabe ler e Escrever</option>
  <option value="F15_24_anos_que_sabe_ler_e_escrever">15 a 24 anos que Sabe ler e Escrever</option>
</select>

<label>Agregado Familiar</label>
<select id="Agregado">
  <option value="">Selecionar</option>
  <option value="F15_24_anos">Total de Agregados Familiares</option>
  <option value="F15_64_anos">Total de Agregados Familiares Com Electricidade Pública</option>
</select>

<label>Habitação</label>
<select id="habitacao">
  <option value="">Selecionar</option>
  <option value="População_Habitações_familiares">Total de População na Habitações Familiares</option>
  <option value="População_Habitações_colectivas">Total de População na Habitações Colectivas</option>
  <option value="População_Sem_abrigo">Total de População sem Abrigo</option>
</select>

<button id="limpar">Limpar Indicador</button>

</div>

<!-- PAINEL SUPERIOR DIREITO -->

<div id="topRightPanel">

<h4>Unidade Territorial</h4>

<select id="territorio">
<option value="provincia">Província</option>
<option value="municipio">Município</option>
<option value="comuna">Comuna</option>
</select>

<h4>Basemap</h4>

<select id="basemapSelect">
<option value="streets">Vias</option>
<option value="satellite">Imagem</option>
<option value="topo-vector">Topográfico</option>
<option value="gray-vector">Cinza</option>
</select>

</div>

<!-- LEGENDA -->

<div id="bottomRightPanel">

<details open>
<summary><b>Legenda</b></summary>
<div id="legendDiv"></div>
</details>

</div>

<script>

require([

"esri/Map",
"esri/views/MapView",
"esri/layers/FeatureLayer",
"esri/widgets/Legend",
"esri/smartMapping/renderers/color"

], function(Map,MapView,FeatureLayer,Legend,colorRendererCreator){

/* CAMADAS */

const camadaProvincia = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Angola/FeatureServer",
title:"Províncias"
});

const camadaMunicipio = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Munic_census_data/FeatureServer",
title:"Municípios",
visible:false
});

const camadaComuna = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Angola/FeatureServer/2",
title:"Comunas",
visible:false
});

/* MAPA */

const map = new Map({
basemap:"streets",
layers:[camadaProvincia,camadaMunicipio,camadaComuna]
});

const view = new MapView({
container:"viewDiv",
map:map,
center:[17.5,-12],
zoom:5
});

/* LEGENDA */

new Legend({
view:view,
container:"legendDiv"
});

/* DETECTAR CAMADA ACTIVA */

function camadaActiva(){

if(camadaProvincia.visible) return camadaProvincia;
if(camadaMunicipio.visible) return camadaMunicipio;
if(camadaComuna.visible) return camadaComuna;

}

/* CORES POR INDICADOR */

const cores={

populacao:["#f1eef6","#0570b0"],
getarios:["#ffffcc","#800026"],
estadoCivil:["#fee5d9","#a50f15"],
rcivil:["#e5f5e0","#006d2c"],
defalbinismo:["#f2f0f7","#54278f"],
orfandade:["#feebe2","#ae017e"],
getnicos:["#fff5cc","#cc7a00"],
lmaterna:["#edf8fb","#006d2c"],
religiao:["#fff5f0","#99000d"],
educacao:["#f2f0f7","#6a51a3"],
Agregado:["#f2f2f2","#4d4d4d"],
habitacao:["#ffffb2","#e31a1c"]

};

/* RENDERER INTELIGENTE */

async function aplicarRenderer(campo,grupo){

const layer = camadaActiva();

const rendererResponse = await colorRendererCreator.createClassBreaksRenderer({

layer:layer,
view:view,
field:campo,
classificationMethod:"natural-breaks",
numClasses:4

});

const renderer = rendererResponse.renderer;

const corInicial = cores[grupo][0];
const corFinal = cores[grupo][1];

renderer.classBreakInfos.forEach((classe,i)=>{

const t = i/(renderer.classBreakInfos.length-1);

const r = Math.round(
parseInt(corInicial.substring(1,3),16)*(1-t) +
parseInt(corFinal.substring(1,3),16)*t
);

const g = Math.round(
parseInt(corInicial.substring(3,5),16)*(1-t) +
parseInt(corFinal.substring(3,5),16)*t
);

const b = Math.round(
parseInt(corInicial.substring(5,7),16)*(1-t) +
parseInt(corFinal.substring(5,7),16)*t
);

classe.symbol.color = [r,g,b,0.9];

});

layer.renderer = renderer;


/* MELHORAR VISIBILIDADE DOS LIMITES */

renderer.classBreakInfos.forEach(function(classe){

classe.symbol.outline = {
color: [0,0,0,1],   // preto
width: 1.5          // espessura da linha
};

});

layer.renderer = renderer;

/* POPUP */

layer.popupEnabled=true;

layer.popupTemplate={
title: "{Nome_Prov}",
content:function(feature){

const nome = feature.graphic.attributes.Nome_Prov || 
feature.graphic.attributes.ADM2_PT || 
feature.graphic.attributes.ADM3_PT;

const valor = feature.graphic.attributes[campo];

return "<b>"+nome+"</b><br>"+campo+": "+valor;

}
};

}

/* EVENTOS INDICADORES */

document.getElementById("populacao").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"populacao");

});

document.getElementById("getarios").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"getarios");

});

document.getElementById("estadoCivil").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"estadoCivil");

});

document.getElementById("rcivil").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"rcivil");

});

document.getElementById("defalbinismo").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"defalbinismo");

});

document.getElementById("orfandade").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"orfandade");

});

document.getElementById("getnicos").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"getnicos");

});

document.getElementById("lmaterna").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"lmaterna");

});

document.getElementById("religiao").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"religiao");

});

document.getElementById("educacao").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"educacao");

});

document.getElementById("Agregado").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"Agregado");

});

document.getElementById("habitacao").addEventListener("change",function(e){

if(e.target.value)
aplicarRenderer(e.target.value,"habitacao");

});

/* POPUP AO PASSAR CURSOR */

view.on("pointer-move",function(event){

view.hitTest(event).then(function(response){

const results=response.results.filter(function(r){

return r.graphic.layer===camadaActiva();

});

if(results.length){

view.popup.open({

location:event.mapPoint,
features:[results[0].graphic]

});

}

});

});

/* MUDAR TERRITÓRIO */

document.getElementById("territorio").addEventListener("change",function(e){

camadaProvincia.visible=false;
camadaMunicipio.visible=false;
camadaComuna.visible=false;

if(e.target.value==="provincia"){
camadaProvincia.visible=true;
view.goTo(camadaProvincia.fullExtent);
}

if(e.target.value==="municipio"){
camadaMunicipio.visible=true;
view.goTo(camadaMunicipio.fullExtent);
}

if(e.target.value==="comuna"){
camadaComuna.visible=true;
view.goTo(camadaComuna.fullExtent);
}

});

/* BASEMAP */

document.getElementById("basemapSelect").addEventListener("change",function(e){

map.basemap=e.target.value;

});

/* LIMPAR */

document.getElementById("limpar").addEventListener("click",function(){

camadaProvincia.renderer=null;
camadaMunicipio.renderer=null;
camadaComuna.renderer=null;

});

});

</script>

</body>
</html>
