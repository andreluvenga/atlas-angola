<script>

require([
"esri/Map",
"esri/views/MapView",
"esri/layers/FeatureLayer",
"esri/widgets/Legend",
"esri/smartMapping/renderers/color",
"esri/widgets/Print"
], function(Map,MapView,FeatureLayer,Legend,colorRendererCreator,Print){

const camadaProvincia = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Provincia_Tot/FeatureServer",
title:"Províncias",
outFields:["Prov"]
});

const camadaMunicipio = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Map_Munic_plat/FeatureServer",
title:"Municípios",
outFields:["Prov", "Muni"],
visible:false
});

const limiteProvincias = new FeatureLayer({
url:"https://services9.arcgis.com/P9hzJERM3hbkT6mx/arcgis/rest/services/Provincia_Tot/FeatureServer",
visible:false,
renderer:{
type:"simple",
symbol:{
type:"simple-fill",
color:[0,0,0,0],
outline:{color:[0,0,0,1],width:2}
}
}
});

const map = new Map({
basemap:"streets",
layers:[camadaProvincia,camadaMunicipio,limiteProvincias]
});

const view = new MapView({
container:"viewDiv",
map:map,
center:[17.5,-12],
zoom:5
});

/* EXPORTAÇÃO */

const print = new Print({
view: view,
printServiceUrl:"https://utility.arcgisonline.com/ArcGIS/rest/services/Utilities/PrintingTools/GPServer/Export%20Web%20Map%20Task"
});

view.ui.add(print,"top-right");

/* POPUP */

view.popup.dockEnabled = true;
view.popup.dockOptions = {
position:"top-center",
breakpoint:false,
buttonEnabled:false
};

new Legend({
view:view,
container:"legendDiv"
});

function camadaActiva(){
if(camadaProvincia.visible) return camadaProvincia;
if(camadaMunicipio.visible) return camadaMunicipio;
}

const cores={
populacao:["#f1eef6","#0570b0"],
getarios:["#ffffcc","#800026"],
estadoCivil:["#fee5d9","#a50f15"],
rcivil:["#e5f5e0","#006d2c"],
albinismo:["#f2f0f7","#54278f"],
orfandade:["#feebe2","#ae017e"],
getnicos:["#fff5cc","#cc7a00"],
lmaterna:["#edf8fb","#006d2c"],
religiao:["#fff5f0","#99000d"],
educacao:["#f2f0f7","#6a51a3"],
Agregado:["#f2f2f2","#4d4d4d"],
habitacao:["#ffffb2","#e31a1c"]
};

async function aplicarRenderer(campo,grupo){

const layer = camadaActiva();

const rendererResponse = await colorRendererCreator.createClassBreaksRenderer({
layer:layer,
view:view,
field:campo,
classificationMethod:"natural-breaks",
numClasses:4
});

const renderer = rendererResponse.renderer;

const corInicial = cores[grupo][0];
const corFinal = cores[grupo][1];

renderer.classBreakInfos.forEach((classe,i)=>{

const t = i/(renderer.classBreakInfos.length-1);

const r = Math.round(parseInt(corInicial.substring(1,3),16)*(1-t) + parseInt(corFinal.substring(1,3),16)*t);
const g = Math.round(parseInt(corInicial.substring(3,5),16)*(1-t) + parseInt(corFinal.substring(3,5),16)*t);
const b = Math.round(parseInt(corInicial.substring(5,7),16)*(1-t) + parseInt(corFinal.substring(5,7),16)*t);

classe.symbol.color = [r,g,b,0.9];
classe.symbol.outline = {color:[0,0,0,1],width:1.5};

});

layer.renderer = renderer;

/* POPUP CORRIGIDO */

layer.popupEnabled = true;

layer.popupTemplate = {

title: function(feature){
const a = feature.graphic.attributes;

if(layer === camadaProvincia){
return a.Prov;
}

if(layer === camadaMunicipio){
return a.Muni;
}
},

content: function(feature){

const a = feature.graphic.attributes;
const valor = a[campo] ?? "Sem dados";

if(layer === camadaProvincia){
return `
<b>Província:</b> ${a.Prov}<br>
<b>${campo}:</b> ${valor}
`;
}

if(layer === camadaMunicipio){
return `
<b>Província:</b> ${a.Prov}<br>
<b>Município:</b> ${a.Muni}<br>
<b>${campo}:</b> ${valor}
`;
}
}
};

/* LABELS */

if(layer === camadaProvincia){
layer.labelingInfo=[{
labelExpressionInfo:{expression:`Text($feature.${campo}, "#,###")`},
symbol:{type:"text",color:"black",haloColor:"white",haloSize:"1px",font:{size:10,weight:"bold"}},
labelPlacement:"center-center"
}];
layer.labelsVisible=true;
}else{
layer.labelsVisible=false;
}

}

/* EVENTOS */

["populacao","getarios","estadoCivil","rcivil","albinismo","orfandade","getnicos","lmaterna","religiao","educacao","Agregado","habitacao"].forEach(id=>{
document.getElementById(id).addEventListener("change",function(e){
if(e.target.value){
aplicarRenderer(e.target.value,id);
}
});
});

/* HOVER */

view.on("pointer-move",function(event){
view.hitTest(event).then(function(response){
const results=response.results.filter(r=>r.graphic.layer===camadaActiva());

if(results.length){
const g = results[0].graphic;
if(view.popup.selectedFeature !== g){
view.popup.open({features:[g],location:null});
}
}else{
view.popup.close();
}
});
});

/* TERRITÓRIO */

document.getElementById("territorio").addEventListener("change",function(e){

camadaProvincia.visible=false;
camadaMunicipio.visible=false;

if(e.target.value==="provincia"){
camadaProvincia.visible=true;
limiteProvincias.visible=false;
}

if(e.target.value==="municipio"){
camadaMunicipio.visible=true;
limiteProvincias.visible=true;
}

});

/* BASEMAP */

document.getElementById("basemapSelect").addEventListener("change",function(e){
map.basemap=e.target.value;
});

/* LIMPAR */

document.getElementById("limpar").addEventListener("click",function(){

camadaProvincia.renderer=null;
camadaMunicipio.renderer=null;

camadaProvincia.labelsVisible=false;

view.popup.close();

});

});

</script>
